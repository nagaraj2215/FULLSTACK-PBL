<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Successful</title>
  <style>
    :root{--bg1:#111827;--bg2:#16a34a;--text:#111827;--muted:#4b5563;}
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#ffffff,#dcfce7);color:var(--text);}
    .card{width:100%;max-width:520px;background:rgba(255,255,255,.95);border-radius:18px;padding:26px 22px;border:1px solid rgba(15,23,42,.08);box-shadow:0 18px 50px rgba(2,6,23,.12);}
    h1{font-size:28px;font-weight:900;}
    p{margin-top:10px;color:var(--muted);font-weight:700;line-height:1.5;}
    .btn{display:inline-block;margin-top:18px;text-decoration:none;padding:12px 16px;border-radius:12px;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:white;font-weight:900;}
  </style>
</head>
<body>
  <div class="card">
    <h1>✅ Register Successful</h1>
    <p>Your account has been created. Now click below to go to the login page.</p>
    <a class="btn" href="/login/">Go to Login</a>
  </div>
</body>
</html>
