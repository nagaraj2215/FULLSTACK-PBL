<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Code</title>
    <style>
        body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;background:linear-gradient(135deg,#ffffff,#dcfce7);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
        .card{width:100%;max-width:520px;background:rgba(255,255,255,.96);border-radius:18px;padding:28px 26px;box-shadow:0 18px 50px rgba(17,24,39,.12);border:1px solid rgba(17,24,39,.08);}
        h1{text-align:center;color:#111827;margin:0 0 8px;}
        p{text-align:center;color:#4b5563;font-weight:700;margin:0 0 16px;}
        .row{margin-top:12px;display:flex;gap:12px;flex-wrap:wrap;}
        input{flex:1;min-width:160px;padding:12px 12px;border-radius:12px;border:1px solid rgba(15,23,42,.14);background:white;}
        button{padding:13px 16px;border:none;border-radius:12px;background:linear-gradient(135deg,#111827,#16a34a);color:white;font-weight:900;cursor:pointer;}
        .msg{color:#111827;font-weight:800;text-align:center;margin-top:10px;}
        .ok{color:#15803d;font-weight:800;text-align:center;margin-top:10px;}
        a{display:inline-block;margin-top:14px;color:#111827;text-decoration:none;font-weight:900;width:100%;text-align:center;}
    </style>
</head>
<body>
    <div class="card">
        <h1>Login</h1>
        <p>Verification page removed.</p>




<form method="POST" action="{% url 'verify_code' %}">
            {% csrf_token %}
            <div class="row">
                <input type="text" name="code" placeholder="Enter 6-digit code" required />
            </div>
            <div class="row" style="margin-top:12px;">
                <button type="submit">Verify</button>
            </div>
        </form>

        {% if message %}
            <div class="msg">{{ message }}</div>
        {% endif %}
        {% if success %}
            <div class="ok">{{ success }}</div>
        {% endif %}

        <a href="{% url 'verify_code' %}">Back</a>

    </div>
</body>
</html>
