<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Improvement</title>
    <style>
        body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;background:linear-gradient(135deg,#ffffff,#dcfce7);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:#111827;}
        .card{width:100%;max-width:820px;background:rgba(255,255,255,.96);border-radius:22px;padding:26px;box-shadow:0 18px 60px rgba(17,24,39,.12);border:1px solid rgba(17,24,39,.08);}
        h1{margin:0 0 10px;color:#111827;}
        p{margin:6px 0;color:#111827;font-weight:700;line-height:1.6;}
        ul{margin:10px 0 0 18px;color:#111827;font-weight:700;line-height:1.7;}
        .actions{margin-top:18px;display:flex;gap:12px;flex-wrap:wrap;}
        a{display:inline-block;padding:12px 16px;border-radius:14px;text-decoration:none;font-weight:900;}
        .primary{background:linear-gradient(135deg,#111827,#16a34a);color:#fff;}
        .secondary{background:rgba(22,163,74,.12);color:#111827;border:1px solid rgba(22,163,74,.25);}
    </style>
</head>
<body>
    <div class="card">
        <h1>Sleep Improvement</h1>
        <p>AI-based sleep guidance (placeholder content):</p>
        <ul>
            <li>Consistent sleep schedule</li>
            <li>Reduce screen time before bed</li>
            <li>Light stretching / breathing routine</li>
        </ul>
        <div class="actions">
            <a class="primary" href="/dashboard/">⬅ Back to Dashboard</a>
            <a class="secondary" href="/stress-management/">Next: Stress Management ➜</a>
        </div>
    </div>
</body>
</html>
